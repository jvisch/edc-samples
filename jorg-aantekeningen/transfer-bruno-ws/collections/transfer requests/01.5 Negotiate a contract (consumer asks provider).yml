info:
  name: 01.5 Negotiate a contract (consumer asks provider)
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:29193/management/v3/contractnegotiations
  body:
    type: json
    data: |-
      {
        "@context": {
          "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        },
        "@type": "ContractRequest",
        "counterPartyAddress": "http://localhost:19194/protocol",
        "protocol": "dataspace-protocol-http",
        "policy": {
          "@context": "http://www.w3.org/ns/odrl.jsonld",
          "@id": "{{contract-offer-id}}",
          "@type": "Offer",
          "assigner": "provider",
          "target": "assetId"
        }
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res('@id')
        method: jsonq
      variable:
        name: contract-negotiation-id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
