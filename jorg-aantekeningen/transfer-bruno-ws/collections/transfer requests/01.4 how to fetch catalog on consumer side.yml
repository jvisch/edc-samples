info:
  name: 01.4 how to fetch catalog on consumer side
  type: http
  seq: 7

http:
  method: POST
  url: http://localhost:29193/management/v3/catalog/request
  body:
    type: json
    data: |-
      {
        "@context": {
          "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        },
        "counterPartyAddress": "http://localhost:19194/protocol",
        "protocol": "dataspace-protocol-http"
      }
  auth: inherit

runtime:
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res('dcat:dataset.odrl:hasPolicy.@id')
        method: jsonq
      variable:
        name: contract-offer-id
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
